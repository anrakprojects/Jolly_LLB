# Jolly LLB / AnrakLegal — first-run MCP provisioning template.
#
# This file is BUNDLED into the app (electron/**, packed into the asar) and read
# at launch by legal-provisioner.cjs -> legal_provisioner.py, which merges the
# `mcp_servers` block below into ~/.hermes/config.yaml idempotently and WITHOUT
# clobbering any existing mcp_servers or other config keys.
#
# PER-USER AUTH VIA OAuth 2.1 (no shared secret, nothing to paste):
#   AnrakLegal serves a spec-compliant OAuth 2.1 MCP endpoint at
#   https://anrak.legal/mcp/anrak (RFC 8414/9728 discovery, PKCE S256, dynamic
#   client registration). With `auth: oauth`, Hermes' mcp_oauth_manager runs the
#   sign-in against the user's OWN AnrakLegal account and stores the per-user
#   token in Hermes' own auth store — NO token ever sits in this config file.
#   This is preferred over the legacy https://anrak.legal/token/<token>/mcp URL
#   (which embeds a per-user secret directly in the config).
#
# CONNECT FLOW (deliberate, not silent): the entry ships `enabled: false`. The
# runtime skips disabled servers entirely (tools/mcp_tool.py register loop:
# `_parse_boolish(v.get("enabled", True))`), so a fresh install never attempts a
# connection or pops a browser unprompted. The user connects from the dashboard
# Connectors page — toggling it on triggers the AnrakLegal OAuth sign-in once;
# thereafter Hermes refreshes the token itself.
#
# NOTE: the OAuth round-trip against AnrakLegal's /api/mcp/oauth/* still needs
# one end-to-end verification with a real account before GA (desktop redirect
# URI + dynamic client registration + refresh).

mcp_servers:
  Anrak Legal:
    url: https://anrak.legal/mcp/anrak
    auth: oauth
    transport: http
    # Disabled until the user connects from the Connectors page (runs the
    # per-user AnrakLegal OAuth sign-in). No token is stored in this file.
    enabled: false
